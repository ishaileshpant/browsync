<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>browsync</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  /* ── Theme Variables (overridden by theme engine) ── */
  :root {
    --bg: #09090b; --bg-s: #111113; --bg-el: #18181b;
    --text: #f4f4f5; --text-s: #a1a1aa; --text-m: #71717a;
    --accent: #3b82f6; --accent-bg: #1e3a5f;
    --green: #22c55e; --amber: #eab308; --red: #ef4444; --purple: #a855f7;
    --border: #27272a; --border-h: #3f3f46;
    --chart-1: #3b82f6; --chart-2: #22c55e; --chart-3: #eab308; --chart-4: #ef4444; --chart-5: #a855f7;
    --mono: 'SF Mono', Menlo, monospace;
    --sans: -apple-system, 'Helvetica Neue', sans-serif;
    --r: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; -webkit-font-smoothing: antialiased; transition: background .3s, color .3s; }

  .sidebar { width: 180px; background: var(--bg-s); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; padding-top: 12px; transition: background .3s; }
  .sidebar-nav { flex: 1; padding: .4rem; }
  .nav-item { display: block; width: 100%; padding: .5rem .7rem; border-radius: 6px; cursor: pointer; font-size: .82rem; color: var(--text-s); border: none; background: none; text-align: left; font-family: var(--sans); transition: all .15s; }
  .nav-item:hover { background: var(--bg-el); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  .sidebar-footer { padding: .5rem .7rem; border-top: 1px solid var(--border); }
  .sidebar-footer .stats { font-size: .7rem; color: var(--text-m); line-height: 1.6; }
  .theme-select { width: 100%; margin-top: .4rem; background: var(--bg-el); color: var(--text-s); border: 1px solid var(--border); border-radius: 4px; padding: .25rem .4rem; font-size: .7rem; font-family: var(--sans); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; transition: background .3s; }
  .toolbar { padding: .5rem .75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
  .search-box { flex: 1; background: var(--bg-el); border: 1px solid var(--border); border-radius: 6px; padding: .35rem .6rem; display: flex; align-items: center; }
  .search-box input { flex: 1; background: none; border: none; color: var(--text); font-size: .82rem; outline: none; font-family: var(--sans); }
  .search-box input::placeholder { color: var(--text-m); }
  .btn { background: var(--bg-el); color: var(--text-s); border: 1px solid var(--border); padding: .35rem .65rem; border-radius: 6px; font-size: .78rem; cursor: pointer; font-family: var(--sans); transition: all .15s; }
  .btn:hover { border-color: var(--border-h); color: var(--text); }
  .btn-p { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-p:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: .4; cursor: default; }

  .content { flex: 1; overflow-y: auto; padding: .75rem; }

  .pills { display: flex; gap: .3rem; flex-wrap: wrap; margin-bottom: .6rem; }
  .pill { padding: .2rem .5rem; border-radius: 99px; border: 1px solid var(--border); background: none; color: var(--text-m); font-size: .7rem; cursor: pointer; font-family: var(--sans); }
  .pill.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: .35rem .45rem; font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: var(--text-m); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: .35rem .45rem; border-bottom: 1px solid var(--border); font-size: .8rem; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .tag { font-family: var(--mono); font-size: .7rem; color: var(--amber); font-weight: 600; width: 28px; }
  .url { color: var(--text-m); font-family: var(--mono); font-size: .72rem; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tcell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .visits { font-family: var(--mono); color: var(--green); font-size: .72rem; text-align: right; }
  .time-col { color: var(--text-m); font-size: .72rem; }
  .act-btn { background: none; border: 1px solid var(--border); color: var(--text-m); padding: .12rem .35rem; border-radius: 4px; font-size: .68rem; cursor: pointer; margin-left: .2rem; }
  .act-btn:hover { border-color: var(--accent); color: var(--accent); }
  .act-btn.sum-btn:hover { border-color: var(--purple); color: var(--purple); }
  .act-btn.pw-btn:hover { border-color: var(--green); color: var(--green); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .65rem; margin-bottom: 1rem; }
  .card { background: var(--bg-s); border: 1px solid var(--border); border-radius: var(--r); padding: .65rem .9rem; }
  .card .lbl { font-size: .68rem; color: var(--text-m); text-transform: uppercase; letter-spacing: .04em; }
  .card .val { font-size: 1.3rem; font-weight: 700; margin-top: .15rem; }

  .browser-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .5rem; }
  .browser-card { background: var(--bg-s); border: 1px solid var(--border); border-radius: var(--r); padding: .65rem; }
  .browser-card .bname { font-weight: 600; font-size: .88rem; margin-bottom: .25rem; }
  .browser-card .binfo { font-size: .72rem; color: var(--text-m); margin-bottom: .35rem; }
  .browser-card .binfo.ok { color: var(--green); }
  .browser-card .done { font-size: .72rem; color: var(--green); margin-top: .25rem; }

  .graph-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .graph-card { background: var(--bg-s); border: 1px solid var(--border); border-radius: var(--r); padding: .75rem; }
  .graph-card h4 { font-size: .82rem; margin-bottom: .5rem; color: var(--text-s); }
  .graph-card.full { grid-column: 1 / -1; }

  .summary-box { background: var(--bg-el); border: 1px solid var(--border); border-radius: var(--r); padding: .6rem .8rem; margin-top: .4rem; font-size: .8rem; line-height: 1.5; color: var(--text-s); }
  .summary-box .engine { font-size: .68rem; color: var(--text-m); margin-top: .3rem; }

  .empty { text-align: center; padding: 2rem; color: var(--text-m); }
  .toast { position: fixed; bottom: 1rem; right: 1rem; background: var(--bg-el); border: 1px solid var(--green); border-radius: var(--r); padding: .45rem .8rem; font-size: .8rem; z-index: 999; transform: translateY(80px); opacity: 0; transition: all .25s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Password modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--bg-s); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; min-width: 350px; max-width: 450px; }
  .modal h3 { font-size: 1rem; margin-bottom: .75rem; }
  .modal .pw-field { font-family: var(--mono); font-size: .9rem; background: var(--bg-el); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .8rem; margin: .5rem 0; word-break: break-all; }
  .modal .pw-note { font-size: .75rem; color: var(--text-m); margin-top: .5rem; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-nav" id="nav"></div>
  <div class="sidebar-footer">
    <div class="stats" id="stats">-</div>
    <select class="theme-select" id="theme-select"></select>
  </div>
</div>
<div class="main">
  <div class="toolbar">
    <div class="search-box"><input type="text" id="q" placeholder="Search bookmarks and history..."></div>
    <button class="btn" id="export-btn">Export</button>
  </div>
  <div class="content" id="out">Loading...</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
  function invoke(cmd, args) { return window.__TAURI__.core.invoke(cmd, args || {}); }

  // ══════════════════════════════════════════
  // THEMES
  // ══════════════════════════════════════════
  var THEMES = {
    midnight: { name: 'Midnight', vars: { '--bg':'#09090b','--bg-s':'#111113','--bg-el':'#18181b','--text':'#f4f4f5','--text-s':'#a1a1aa','--text-m':'#71717a','--accent':'#3b82f6','--accent-bg':'#1e3a5f','--green':'#22c55e','--amber':'#eab308','--red':'#ef4444','--purple':'#a855f7','--border':'#27272a','--border-h':'#3f3f46','--chart-1':'#3b82f6','--chart-2':'#22c55e','--chart-3':'#eab308','--chart-4':'#ef4444','--chart-5':'#a855f7' }},
    nord: { name: 'Nord', vars: { '--bg':'#2e3440','--bg-s':'#3b4252','--bg-el':'#434c5e','--text':'#eceff4','--text-s':'#d8dee9','--text-m':'#81a1c1','--accent':'#88c0d0','--accent-bg':'#2e3440','--green':'#a3be8c','--amber':'#ebcb8b','--red':'#bf616a','--purple':'#b48ead','--border':'#4c566a','--border-h':'#5e6779','--chart-1':'#88c0d0','--chart-2':'#a3be8c','--chart-3':'#ebcb8b','--chart-4':'#bf616a','--chart-5':'#b48ead' }},
    dracula: { name: 'Dracula', vars: { '--bg':'#282a36','--bg-s':'#1e1f29','--bg-el':'#44475a','--text':'#f8f8f2','--text-s':'#bd93f9','--text-m':'#6272a4','--accent':'#ff79c6','--accent-bg':'#3a2040','--green':'#50fa7b','--amber':'#f1fa8c','--red':'#ff5555','--purple':'#bd93f9','--border':'#44475a','--border-h':'#6272a4','--chart-1':'#ff79c6','--chart-2':'#50fa7b','--chart-3':'#f1fa8c','--chart-4':'#ff5555','--chart-5':'#bd93f9' }},
    solarized: { name: 'Solarized Dark', vars: { '--bg':'#002b36','--bg-s':'#073642','--bg-el':'#0a4050','--text':'#fdf6e3','--text-s':'#93a1a1','--text-m':'#657b83','--accent':'#268bd2','--accent-bg':'#0d3b4d','--green':'#859900','--amber':'#b58900','--red':'#dc322f','--purple':'#6c71c4','--border':'#0a4050','--border-h':'#2aa198','--chart-1':'#268bd2','--chart-2':'#859900','--chart-3':'#b58900','--chart-4':'#dc322f','--chart-5':'#6c71c4' }},
    light: { name: 'Light', vars: { '--bg':'#ffffff','--bg-s':'#f8f9fa','--bg-el':'#f1f3f5','--text':'#212529','--text-s':'#495057','--text-m':'#868e96','--accent':'#1971c2','--accent-bg':'#d0ebff','--green':'#2b8a3e','--amber':'#e67700','--red':'#c92a2a','--purple':'#7048e8','--border':'#dee2e6','--border-h':'#adb5bd','--chart-1':'#1971c2','--chart-2':'#2b8a3e','--chart-3':'#e67700','--chart-4':'#c92a2a','--chart-5':'#7048e8' }},
    monokai: { name: 'Monokai', vars: { '--bg':'#272822','--bg-s':'#1e1f1c','--bg-el':'#3e3d32','--text':'#f8f8f2','--text-s':'#a6e22e','--text-m':'#75715e','--accent':'#66d9ef','--accent-bg':'#1a3a40','--green':'#a6e22e','--amber':'#e6db74','--red':'#f92672','--purple':'#ae81ff','--border':'#49483e','--border-h':'#75715e','--chart-1':'#66d9ef','--chart-2':'#a6e22e','--chart-3':'#e6db74','--chart-4':'#f92672','--chart-5':'#ae81ff' }},
    catppuccin: { name: 'Catppuccin Mocha', vars: { '--bg':'#1e1e2e','--bg-s':'#181825','--bg-el':'#313244','--text':'#cdd6f4','--text-s':'#bac2de','--text-m':'#6c7086','--accent':'#89b4fa','--accent-bg':'#1e2a45','--green':'#a6e3a1','--amber':'#f9e2af','--red':'#f38ba8','--purple':'#cba6f7','--border':'#313244','--border-h':'#45475a','--chart-1':'#89b4fa','--chart-2':'#a6e3a1','--chart-3':'#f9e2af','--chart-4':'#f38ba8','--chart-5':'#cba6f7' }},
    github: { name: 'GitHub Dark', vars: { '--bg':'#0d1117','--bg-s':'#161b22','--bg-el':'#21262d','--text':'#c9d1d9','--text-s':'#8b949e','--text-m':'#484f58','--accent':'#58a6ff','--accent-bg':'#1a2740','--green':'#3fb950','--amber':'#d29922','--red':'#f85149','--purple':'#bc8cff','--border':'#30363d','--border-h':'#484f58','--chart-1':'#58a6ff','--chart-2':'#3fb950','--chart-3':'#d29922','--chart-4':'#f85149','--chart-5':'#bc8cff' }},
  };

  function applyTheme(id) {
    var theme = THEMES[id];
    if (!theme) return;
    var root = document.documentElement;
    Object.keys(theme.vars).forEach(function(k) { root.style.setProperty(k, theme.vars[k]); });
    settings.theme = id;
    persistSettings();
  }

  function buildThemeSelect() {
    var sel = document.getElementById('theme-select');
    var h = '';
    Object.keys(THEMES).forEach(function(id) { h += '<option value="'+id+'"'+(settings.theme===id?' selected':'')+'>'+THEMES[id].name+'</option>'; });
    sel.innerHTML = h;
    sel.addEventListener('change', function() { applyTheme(this.value); });
  }

  // ══════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════
  var VIEWS = ['bookmarks','history','search','graphs','import','auth','dashboard'];
  var settings = { theme: 'midnight' };
  var state = { view: 'bookmarks', filter: null, imported: {}, searchQuery: '' };
  var chartInstances = [];

  // ══════════════════════════════════════════
  // HELPERS
  // ══════════════════════════════════════════
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function shortUrl(u) { return (u||'').replace(/^https?:\/\//,'').replace(/\/$/,'').substring(0,50); }
  function timeAgo(d) {
    if (!d) return ''; var ms = Date.now()-new Date(d).getTime(), m=Math.floor(ms/60000);
    if(m<1) return 'now'; if(m<60) return m+'m'; var h=Math.floor(m/60);
    if(h<24) return h+'h'; var dy=Math.floor(h/24); if(dy<30) return dy+'d';
    var mo=Math.floor(dy/30); if(mo<12) return mo+'mo'; return Math.floor(mo/12)+'y';
  }
  function toast(msg, err) {
    var el=document.getElementById('toast'); el.textContent=msg;
    el.style.borderColor=err?'var(--red)':'var(--green)';
    el.classList.add('show'); setTimeout(function(){el.classList.remove('show');}, 3500);
  }
  function destroyCharts() { chartInstances.forEach(function(c){c.destroy();}); chartInstances=[]; }

  // ══════════════════════════════════════════
  // NAV + RENDER
  // ══════════════════════════════════════════
  function buildNav() {
    var labels = {bookmarks:'Bookmarks',history:'History',search:'Search',graphs:'Graphs',import:'Import',auth:'Auth',dashboard:'Dashboard'};
    var h=''; VIEWS.forEach(function(v) { h+='<button class="nav-item'+(v===state.view?' active':'')+'" data-v="'+v+'">'+labels[v]+'</button>'; });
    document.getElementById('nav').innerHTML = h;
  }

  function switchView(v) {
    if (VIEWS.indexOf(v)<0) return;
    if (v!==state.view) state.filter = null;
    state.view = v;
    destroyCharts();
    buildNav();
    render();
  }

  async function render() {
    var el = document.getElementById('out');
    el.innerHTML = '<div class="empty">Loading...</div>';
    try {
      switch(state.view) {
        case 'bookmarks': await vBookmarks(el); break;
        case 'history': await vHistory(el); break;
        case 'search': await vSearch(el); break;
        case 'graphs': await vGraphs(el); break;
        case 'import': await vImport(el); break;
        case 'auth': await vAuth(el); break;
        case 'dashboard': await vDashboard(el); break;
      }
    } catch(e) { el.innerHTML='<div class="empty" style="color:var(--red)">'+esc(String(e))+'</div>'; }
  }

  function pillsHtml() {
    var bs=['Chrome','Firefox','Safari','Edge','Brave','Arc'];
    var h='<div class="pills"><button class="pill'+(!state.filter?' on':'')+'" data-filter="">All</button>';
    bs.forEach(function(b){h+='<button class="pill'+(state.filter===b.toLowerCase()?' on':'')+'" data-filter="'+b.toLowerCase()+'">'+b+'</button>';});
    return h+'</div>';
  }

  // ══════════════════════════════════════════
  // BOOKMARKS VIEW (with summarize button)
  // ══════════════════════════════════════════
  async function vBookmarks(el) {
    var bms = await invoke('get_bookmarks',{browserFilter:state.filter||null});
    if (!bms.length && !state.filter) {
      var s=await invoke('get_stats'); if(s.bookmark_count===0){el.innerHTML='<div class="empty">No bookmarks yet.<br><br><button class="btn btn-p" data-action="goto-import">Import</button></div>';return;}
    }
    if(!bms.length){el.innerHTML=pillsHtml()+'<div class="empty">No matches for this filter.</div>';return;}
    var h=pillsHtml()+'<table><thead><tr><th></th><th>Title</th><th>URL</th><th>Folder</th><th></th></tr></thead><tbody>';
    bms.slice(0,500).forEach(function(b){
      var t=(b.source_browser||'?').charAt(0).toUpperCase();
      h+='<tr><td class="tag">['+t+']</td><td class="tcell" title="'+esc(b.title)+'">'+esc(b.title)+'</td><td class="url" title="'+esc(b.url)+'">'+esc(shortUrl(b.url))+'</td><td class="folder">'+esc((b.folder_path||[]).join('/'))+'</td>';
      h+='<td><button class="act-btn" data-url="'+esc(b.url)+'">Open</button><button class="act-btn sum-btn" data-sum="'+esc(b.url)+'" title="Summarize">AI</button></td></tr>';
    });
    h+='</tbody></table>';
    if(bms.length>500) h+='<div style="padding:.4rem;font-size:.7rem;color:var(--text-m)">500 of '+bms.length+'</div>';
    el.innerHTML=h;
  }

  // ══════════════════════════════════════════
  // HISTORY VIEW
  // ══════════════════════════════════════════
  async function vHistory(el) {
    var hs=await invoke('get_history',{limit:500,browserFilter:state.filter||null});
    if(!hs.length&&!state.filter){var s=await invoke('get_stats');if(s.history_count===0){el.innerHTML='<div class="empty">No history yet.<br><br><button class="btn btn-p" data-action="goto-import">Import</button></div>';return;}}
    if(!hs.length){el.innerHTML=pillsHtml()+'<div class="empty">No matches.</div>';return;}
    var h=pillsHtml()+'<table><thead><tr><th></th><th>Title</th><th>URL</th><th style="text-align:right">Visits</th><th>When</th><th></th></tr></thead><tbody>';
    hs.forEach(function(e){
      var t=(e.source_browser||'?').charAt(0).toUpperCase();
      h+='<tr><td class="tag">['+t+']</td><td class="tcell">'+esc(e.title||'(untitled)')+'</td><td class="url">'+esc(shortUrl(e.url))+'</td><td class="visits">'+e.visit_count+'x</td><td class="time-col">'+timeAgo(e.last_visited)+'</td><td><button class="act-btn" data-url="'+esc(e.url)+'">Open</button></td></tr>';
    });
    el.innerHTML=h+'</tbody></table>';
  }

  // ══════════════════════════════════════════
  // SEARCH VIEW
  // ══════════════════════════════════════════
  async function vSearch(el) {
    var q=state.searchQuery;
    if(!q){el.innerHTML='<div class="empty">Type a query above and press Enter.</div>';return;}
    var r=await invoke('search_all',{query:q}); var n=r.bookmarks.length+r.history.length;
    var h='<div style="font-size:.8rem;color:var(--text-m);margin-bottom:.6rem">'+n+' results for "'+esc(q)+'"</div>';
    if(r.bookmarks.length){h+='<h4 style="font-size:.85rem;margin-bottom:.3rem">Bookmarks ('+r.bookmarks.length+')</h4><table style="margin-bottom:1rem"><tbody>';r.bookmarks.slice(0,50).forEach(function(b){var t=(b.source_browser||'?').charAt(0).toUpperCase();h+='<tr><td class="tag">['+t+']</td><td class="tcell">'+esc(b.title)+'</td><td class="url">'+esc(shortUrl(b.url))+'</td><td><button class="act-btn" data-url="'+esc(b.url)+'">Open</button></td></tr>';});h+='</tbody></table>';}
    if(r.history.length){h+='<h4 style="font-size:.85rem;margin-bottom:.3rem">History ('+r.history.length+')</h4><table><tbody>';r.history.slice(0,50).forEach(function(e){var t=(e.source_browser||'?').charAt(0).toUpperCase();h+='<tr><td class="tag">['+t+']</td><td class="tcell">'+esc(e.title||'')+'</td><td class="url">'+esc(shortUrl(e.url))+'</td><td class="visits">'+e.visit_count+'x</td><td><button class="act-btn" data-url="'+esc(e.url)+'">Open</button></td></tr>';});h+='</tbody></table>';}
    if(!n) h+='<div class="empty">No results.</div>';
    el.innerHTML=h;
  }

  // ══════════════════════════════════════════
  // GRAPHS VIEW
  // ══════════════════════════════════════════
  async function vGraphs(el) {
    var data = await invoke('get_graph_data');
    el.innerHTML = '<div class="graph-grid">' +
      '<div class="graph-card full"><h4>Activity Timeline (Bookmarks + History by Month)</h4><canvas id="chart-timeline"></canvas></div>' +
      '<div class="graph-card"><h4>Top Bookmarked Domains</h4><canvas id="chart-domains"></canvas></div>' +
      '<div class="graph-card"><h4>Most Visited Sites</h4><canvas id="chart-visited"></canvas></div>' +
      '<div class="graph-card"><h4>Browser Distribution</h4><canvas id="chart-browsers"></canvas></div>' +
      '<div class="graph-card"><h4>Domain Categories</h4><canvas id="chart-categories"></canvas></div>' +
      '</div>';

    var cs = getComputedStyle(document.documentElement);
    var c1=cs.getPropertyValue('--chart-1').trim(), c2=cs.getPropertyValue('--chart-2').trim(),
        c3=cs.getPropertyValue('--chart-3').trim(), c4=cs.getPropertyValue('--chart-4').trim(),
        c5=cs.getPropertyValue('--chart-5').trim(), tm=cs.getPropertyValue('--text-m').trim(),
        border=cs.getPropertyValue('--border').trim();

    Chart.defaults.color = tm;
    Chart.defaults.borderColor = border;

    // Timeline
    chartInstances.push(new Chart(document.getElementById('chart-timeline'), {
      type:'line', data:{
        labels: data.timeline.map(function(p){return p.date;}),
        datasets:[
          {label:'Bookmarks',data:data.timeline.map(function(p){return p.bookmarks;}),borderColor:c1,backgroundColor:c1+'33',fill:true,tension:.3},
          {label:'History',data:data.timeline.map(function(p){return p.history;}),borderColor:c2,backgroundColor:c2+'33',fill:true,tension:.3}
        ]
      }, options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}
    }));

    // Top domains (bar)
    chartInstances.push(new Chart(document.getElementById('chart-domains'), {
      type:'bar', data:{
        labels:data.topDomains.map(function(d){return d.domain.substring(0,20);}),
        datasets:[{label:'Bookmarks',data:data.topDomains.map(function(d){return d.count;}),backgroundColor:c1+'99'}]
      }, options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}}}
    }));

    // Most visited (bar)
    chartInstances.push(new Chart(document.getElementById('chart-visited'), {
      type:'bar', data:{
        labels:data.topVisited.map(function(d){return d.domain.substring(0,20);}),
        datasets:[{label:'Visits',data:data.topVisited.map(function(d){return d.count;}),backgroundColor:c2+'99'}]
      }, options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}}}
    }));

    // Browser dist (doughnut)
    var bKeys=Object.keys(data.browserDist), bVals=bKeys.map(function(k){return data.browserDist[k];});
    chartInstances.push(new Chart(document.getElementById('chart-browsers'), {
      type:'doughnut', data:{labels:bKeys,datasets:[{data:bVals,backgroundColor:[c1,c2,c3,c4,c5,tm]}]},
      options:{responsive:true,plugins:{legend:{position:'bottom'}}}
    }));

    // Categories (simple domain grouping)
    var cats = {}; data.topDomains.forEach(function(d) {
      var cat = 'Other';
      if (d.domain.match(/github|gitlab|bitbucket/i)) cat='Dev';
      else if (d.domain.match(/google|bing|duckduck/i)) cat='Search';
      else if (d.domain.match(/youtube|netflix|spotify/i)) cat='Media';
      else if (d.domain.match(/stackoverflow|reddit|medium/i)) cat='Community';
      else if (d.domain.match(/docs\.|developer\.|mdn|w3/i)) cat='Docs';
      else if (d.domain.match(/linkedin|twitter|facebook/i)) cat='Social';
      cats[cat] = (cats[cat]||0) + d.count;
    });
    chartInstances.push(new Chart(document.getElementById('chart-categories'), {
      type:'polarArea', data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:[c1+'99',c2+'99',c3+'99',c4+'99',c5+'99',tm+'99']}]},
      options:{responsive:true,plugins:{legend:{position:'bottom'}}}
    }));
  }

  // ══════════════════════════════════════════
  // IMPORT VIEW
  // ══════════════════════════════════════════
  async function vImport(el) {
    var browsers=await invoke('detect_browsers'); var s=await invoke('get_stats'); var has=s.bookmark_count>0;
    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem"><div><h4 style="font-size:.95rem;margin:0">Browser Import</h4>';
    if(has) h+='<div style="font-size:.72rem;color:var(--text-m);margin-top:.15rem">'+s.bookmark_count.toLocaleString()+' bookmarks, '+s.history_count.toLocaleString()+' history (re-import updates, no duplicates)</div>';
    h+='</div><button class="btn btn-p" data-action="import-all">'+(has?'Re-sync All':'Import All')+'</button></div><div class="browser-grid">';
    browsers.forEach(function(b){
      var imp=state.imported[b.name];
      h+='<div class="browser-card"><div class="bname">'+b.name+'</div><div class="binfo '+(b.has_data?'ok':'')+'">'+
        (b.has_data?'Available':(b.is_installed?'No data':'Not found'))+(b.has_bookmarks?' · bk':'')+(b.has_history?' · hist':'')+'</div>';
      if(imp) h+='<div class="done">'+imp+'</div><button class="btn" data-action="import-one" data-browser="'+b.name+'">Re-sync</button>';
      else h+='<button class="btn btn-p" data-action="import-one" data-browser="'+b.name+'"'+(b.has_data?'':' disabled')+'>'+(b.has_data?'Import':'N/A')+'</button>';
      h+='</div>';
    });
    el.innerHTML=h+'</div>';
  }

  // ══════════════════════════════════════════
  // AUTH VIEW (with password reveal)
  // ══════════════════════════════════════════
  async function vAuth(el) {
    var entries=await invoke('get_auth_entries');
    if(!entries.length){el.innerHTML='<div class="empty">No auth entries found.</div>';return;}
    var h='<table><thead><tr><th>Domain</th><th>Username</th><th>Browser</th><th></th></tr></thead><tbody>';
    entries.forEach(function(e){
      h+='<tr><td style="font-family:var(--mono);font-size:.8rem">'+esc(e.domain)+'</td><td>'+esc(e.username||'(none)')+'</td><td class="tag">'+esc(e.browser)+'</td>';
      h+='<td><button class="act-btn pw-btn" data-pw-domain="'+esc(e.domain)+'" title="View password (requires biometric)">Show</button></td></tr>';
    });
    h+='</tbody></table><div style="padding:.4rem;font-size:.7rem;color:var(--text-m)">'+entries.length+' entries. Passwords require system authentication to reveal.</div>';
    el.innerHTML=h;
  }

  // ══════════════════════════════════════════
  // DASHBOARD VIEW
  // ══════════════════════════════════════════
  async function vDashboard(el) {
    var s=await invoke('get_stats'); var sl=await invoke('get_sync_log'); var bs=await invoke('detect_browsers');
    var active=bs.filter(function(b){return b.has_data;});
    var h='<div class="cards"><div class="card"><div class="lbl">Bookmarks</div><div class="val">'+s.bookmark_count.toLocaleString()+'</div></div>'+
      '<div class="card"><div class="lbl">History</div><div class="val">'+s.history_count.toLocaleString()+'</div></div>'+
      '<div class="card"><div class="lbl">Browsers</div><div class="val">'+active.length+'</div></div>'+
      '<div class="card"><div class="lbl">Syncs</div><div class="val">'+sl.length+'</div></div></div>';
    if(sl.length){h+='<h4 style="font-size:.85rem;margin-bottom:.4rem">Recent syncs</h4><table>';sl.forEach(function(e){h+='<tr><td style="font-weight:600;width:80px">'+e.browser+'</td><td>'+e.sync_type+'</td><td style="text-align:right">'+e.items.toLocaleString()+'</td><td class="time-col">'+timeAgo(e.time)+'</td></tr>';});h+='</table>';}
    el.innerHTML=h;
  }

  // ══════════════════════════════════════════
  // ACTIONS
  // ══════════════════════════════════════════
  async function doImportOne(name,btn){
    btn.textContent='...'; btn.disabled=true;
    try{var r=await invoke('import_browser',{browserName:name}); state.imported[name]=r.bookmarks+' bk + '+r.history+' hist'; toast(r.browser+': '+r.bookmarks+' bk + '+r.history+' hist'); refreshSidebar(); vImport(document.getElementById('out'));}
    catch(e){toast(String(e),1);btn.textContent='Retry';btn.disabled=false;}
  }

  async function doImportAll(){
    try{var rs=await invoke('import_all'); var t=0; rs.forEach(function(r){state.imported[r.browser]=r.bookmarks+' bk + '+r.history+' hist'; t+=r.bookmarks+r.history;}); toast('Imported '+t+' items'); refreshSidebar(); vImport(document.getElementById('out'));}
    catch(e){toast(String(e),1);}
  }

  async function doSummarize(url, btn) {
    btn.textContent = '...';
    btn.disabled = true;
    try {
      var r = await invoke('summarize_url', { url: url });
      var row = btn.closest('tr');
      var existing = row.nextElementSibling;
      if (existing && existing.classList.contains('sum-row')) existing.remove();
      var tr = document.createElement('tr');
      tr.className = 'sum-row';
      tr.innerHTML = '<td colspan="5"><div class="summary-box">' + esc(r.summary) + '<div class="engine">via ' + r.engine + (r.note ? ' — ' + esc(r.note) : '') + '</div></div></td>';
      row.after(tr);
      btn.textContent = 'AI';
      btn.disabled = false;
    } catch (e) {
      toast(String(e), true);
      btn.textContent = 'AI';
      btn.disabled = false;
    }
  }

  async function doViewPassword(domain) {
    try {
      var r = await invoke('view_password', { domain: domain });
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal"><h3>Password for ' + esc(domain) + '</h3>' +
        '<div class="pw-field">' + esc(r.password) + '</div>' +
        '<div class="pw-note">Source: ' + esc(r.source) + '. This was retrieved from macOS Keychain with your authorization.</div>' +
        '<button class="btn" style="margin-top:.75rem" data-action="close-modal">Close</button></div>';
      document.body.appendChild(overlay);
    } catch (e) {
      toast(String(e), true);
    }
  }

  async function refreshSidebar() {
    try {var s=await invoke('get_stats'); document.getElementById('stats').innerHTML=s.bookmark_count.toLocaleString()+' bookmarks<br>'+s.history_count.toLocaleString()+' history';}catch(e){}
  }

  function persistSettings() {
    invoke('save_settings', { settingsJson: JSON.stringify(settings) }).catch(function(){});
  }

  // ══════════════════════════════════════════
  // EVENT DELEGATION
  // ══════════════════════════════════════════
  document.getElementById('nav').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-v]');
    if (btn) switchView(btn.dataset.v);
  });

  document.getElementById('q').addEventListener('keydown', function(e) {
    if (e.key==='Enter') { state.searchQuery=e.target.value.trim(); if(state.searchQuery){switchView('search');} }
  });

  document.getElementById('export-btn').addEventListener('click', function() {
    var p=prompt('Export path:','~/Desktop/bookmarks.html'); if(!p) return;
    var f=p.endsWith('.json')?'json':p.endsWith('.csv')?'csv':'html';
    invoke('export_bookmarks',{format:f,path:p,browserFilter:null}).then(function(m){toast(m);}).catch(function(e){toast(String(e),1);});
  });

  document.getElementById('out').addEventListener('click', function(e) {
    var t = e.target;
    if (t.dataset.url) { invoke('open_url',{url:t.dataset.url}); return; }
    if (t.dataset.sum) { doSummarize(t.dataset.sum, t); return; }
    if (t.dataset.filter !== undefined) { state.filter = t.dataset.filter || null; render(); return; }
    if (t.dataset.action === 'import-one' && !t.disabled) { doImportOne(t.dataset.browser, t); return; }
    if (t.dataset.action === 'import-all') { doImportAll(); return; }
    if (t.dataset.action === 'goto-import') { switchView('import'); return; }
    if (t.dataset.pwDomain) { doViewPassword(t.dataset.pwDomain); return; }
  });

  document.body.addEventListener('click', function(e) {
    if (e.target.dataset.action === 'close-modal' || e.target.classList.contains('modal-overlay')) {
      var m = document.querySelector('.modal-overlay');
      if (m) m.remove();
    }
  });

  // ══════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════
  (async function() {
    var i=0; while(!window.__TAURI__&&i++<30) await new Promise(function(r){setTimeout(r,100);});
    if (!window.__TAURI__||!window.__TAURI__.core){document.getElementById('out').innerHTML='<div class="empty" style="color:var(--red)">Tauri not loaded.</div>';return;}

    // Load persisted settings
    try {
      var raw = await invoke('load_settings');
      var saved = JSON.parse(raw);
      if (saved.theme) settings.theme = saved.theme;
    } catch(e) {}

    buildThemeSelect();
    applyTheme(settings.theme);
    buildNav();
    await refreshSidebar();
    await render();
  })();
})();
</script>
</body>
</html>
