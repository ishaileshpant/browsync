name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../browsync-${{ github.ref_name }}-${{ matrix.target }}.tar.gz browsync browsyncd 2>/dev/null || tar czf ../../../browsync-${{ github.ref_name }}-${{ matrix.target }}.tar.gz browsync

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path browsync.exe,browsyncd.exe -DestinationPath ../../../browsync-${{ github.ref_name }}-${{ matrix.target }}.zip -ErrorAction SilentlyContinue
          if (-not (Test-Path ../../../browsync-${{ github.ref_name }}-${{ matrix.target }}.zip)) {
            Compress-Archive -Path browsync.exe -DestinationPath ../../../browsync-${{ github.ref_name }}-${{ matrix.target }}.zip
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browsync-${{ matrix.target }}
          path: browsync-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            browsync-*.tar.gz
            browsync-*.zip

  pages:
    name: Deploy Docs
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - uses: actions/deploy-pages@v4
        id: deployment
